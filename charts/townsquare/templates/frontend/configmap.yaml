apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "townsquare.frontend.fullname" . }}-runtime
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  runtime-config.js: |-
{{ include "townsquare.frontend.runtimeConfig" . | nindent 4 }}
{{- if .Values.frontend.nginxConfig }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "townsquare.frontend.fullname" . }}-nginx
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  default.conf: |-
{{ .Values.frontend.nginxConfig | nindent 4 }}
{{- end }}
