{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "s-ui.fullname" . }}-db
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "s-ui.labels" . | nindent 4 }}
  {{- with (merge .Values.persistence.annotations .Values.commonAnnotations) }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- range .Values.persistence.accessModes }}
    - {{ . | quote }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- include "s-ui.storageClass" . | nindent 2 }}
{{- end }}
{{- if and .Values.certPersistence.enabled (not .Values.certPersistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "s-ui.fullname" . }}-cert
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "s-ui.labels" . | nindent 4 }}
  {{- with (merge .Values.certPersistence.annotations .Values.commonAnnotations) }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- range .Values.certPersistence.accessModes }}
    - {{ . | quote }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.certPersistence.size | quote }}
  {{- include "s-ui.certStorageClass" . | nindent 2 }}
{{- end }}
