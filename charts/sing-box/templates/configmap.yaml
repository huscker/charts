apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sing-box.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "sing-box.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  config.json: |-
    {{- .Values.config | nindent 4 }}
